<script>
function calculateStat(statName) {
  const stat = stats[statName];
  let total = stat.base;

  // Collect all bonuses that apply to this stat
  let allBonuses = [];

  // 1. Add stat-specific bonuses
  for (let type in stat.bonuses) {
    allBonuses.push(
      ...stat.bonuses[type].map(b => ({ ...b, type }))
    );
  }

  // 2. Add global bonuses that match this stat's categories
  globalBonuses.forEach(b => {
    if (b.categories.some(cat => stat.categories.includes(cat))) {
      allBonuses.push(b);
    }
  });

  // 3. Apply NON-STACKING bonuses (highest only)
  NON_STACKING_TYPES.forEach(type => {
    const filtered = allBonuses.filter(b => b.type === type);
    if (filtered.length > 0) {
      total += Math.max(...filtered.map(b => b.value));
    }
  });

  // 4. Apply STACKING bonuses (sum all)
  STACKING_TYPES.forEach(type => {
    const filtered = allBonuses.filter(b => b.type === type);
    total += filtered.reduce((a, b) => a + b.value, 0);
  });

  return total;
}
</script>
