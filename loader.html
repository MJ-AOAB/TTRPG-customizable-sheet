<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Character sheet</title>
<link rel="stylesheet" href="loader.css">
<script src="/CharacterSheets/data.js"></script>
<script src="/resourceLoaders/initCalc.js"></script>
<script src="/resourceLoaders/initLoad.js"></script>

</head>

<body>

<!-- Tab links -->
<div class="tab">
  <button class="tablinks" onclick="openTab(event, 'Main')" id="defaultOpen">Main</button>
  <button class="tablinks" onclick="openTab(event, 'Equipment')">Equipment</button>
  <button class="tablinks" onclick="openTab(event, 'Battle')">Battle</button>
   <button class="tablinks" onclick="openTab(event, 'Conditions')">Condtions</button>
</div>

<!-- Tab content -->
<div id="Main" class="tabcontent">
  <span onclick="this.parentElement.style.display='none'">x</span>
  <div id="MainContent"></div>
</div>

<div id="Equipment" class="tabcontent">
  <span onclick="this.parentElement.style.display='none'">x</span>
  <div id="equipContent"></div>
</div>

<div id="Battle" class="tabcontent">
  <span onclick="this.parentElement.style.display='none'">x</span>
  <div id="battleContent"></div>
</div>

<div id="Conditions" class="tabcontent">
  <span onclick="this.parentElement.style.display='none'">x</span>
  <div id="conditionContent"></div>
</div>

<script>
function openTab(evt, Tab) {
  var i, tabcontent, tablinks;

  // Hide all tab content
  tabcontent = document.getElementsByClassName("tabcontent");
  for (i = 0; i < tabcontent.length; i++) {
    tabcontent[i].style.display = "none";
  }

  // Remove "active" class from all tab buttons
  tablinks = document.getElementsByClassName("tablinks");
  for (i = 0; i < tablinks.length; i++) {
    tablinks[i].className = tablinks[i].className.replace(" active", "");
  }

  // Show selected tab
  document.getElementById(Tab).style.display = "block";

  // Add active class to clicked button
  evt.currentTarget.className += " active";

  // Load external HTML for each tab
  if (Tab === "Main") {
    fetch("/tabs/mainSheet.html")
      .then(r => r.text())
      .then(t => document.getElementById("MainContent").innerHTML = t);
  }

  if (Tab === "Equipment") {
    fetch("/tabs/equipment.html")
      .then(r => r.text())
      .then(t => document.getElementById("equipContent").innerHTML = t);
  }

  if (Tab === "Battle") {
    fetch("/tabs/battle.html")
      .then(r => r.text())
      .then(t => document.getElementById("battleContent").innerHTML = t);
  }
    if (Tab === "Conditions") {
    fetch("/tabs/conditions.html")
      .then(r => r.text())
      .then(t => document.getElementById("conditionContent").innerHTML = t);
  }
}

// Auto-open default tab
document.getElementById("defaultOpen").click();
</script>

</body>
</html>
