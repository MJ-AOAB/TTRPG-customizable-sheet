<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Character sheet</title>

<style>
/* Style the tab */
.tab {
  overflow: hidden;
  border: 1px solid #ccc;
  background-color: #f1f1f1;
}

/* Style the buttons that are used to open the tab content */
.tab button {
  background-color: inherit;
  float: left;
  border: none;
  outline: none;
  cursor: pointer;
  padding: 14px 16px;
  transition: 0.3s;
}

/* Change background color of buttons on hover */
.tab button:hover {
  background-color: #ddd;
}

/* Create an active/current tablink class */
.tab button.active {
  background-color: #ccc;
}

/* Style the tab content */
.tabcontent {
  display: none;
  padding: 6px 12px;
  border: 1px solid #ccc;
  border-top: none;
  animation: fadeEffect 1s;
}

/* Fade animation */
@keyframes fadeEffect {
  from {opacity: 0;}
  to {opacity: 1;}
}

/* Close button */
.tabcontent span {
  float: right;
  cursor: pointer;
  font-weight: bold;
  padding: 4px;
}
</style>
</head>

<body>

<!-- Tab links -->
<div class="tab">
  <button class="tablinks" onclick="openTab(event, 'Main')" id="defaultOpen">Main</button>
  <button class="tablinks" onclick="openTab(event, 'Paris')">Paris</button>
  <button class="tablinks" onclick="openTab(event, 'Tokyo')">Tokyo</button>
</div>

<!-- Tab content -->
<div id="Main" class="tabcontent">
  <span onclick="this.parentElement.style.display='none'">x</span>
  <h3>Main</h3>
  <p>London is the capital city of England.</p>
</div>

<div id="Paris" class="tabcontent">
  <span onclick="this.parentElement.style.display='none'">x</span>
  <h3>Paris</h3>
  <p>Paris is the capital of France.</p>
</div>

<div id="Tokyo" class="tabcontent">
  <span onclick="this.parentElement.style.display='none'">x</span>
  <h3>Tokyo</h3>
  <p>Tokyo is the capital of Japan.</p>
</div>

<script>
function openTab(evt, Tab) {
  var i, tabcontent, tablinks;

  // Hide all tab content
  tabcontent = document.getElementsByClassName("tabcontent");
  for (i = 0; i < tabcontent.length; i++) {
    tabcontent[i].style.display = "none";
  }

  // Remove "active" class from all tab buttons
  tablinks = document.getElementsByClassName("tablinks");
  for (i = 0; i < tablinks.length; i++) {
    tablinks[i].className = tablinks[i].className.replace(" active", "");
  }

  // Show selected tab
  document.getElementById(Tab).style.display = "block";

  // Add active class to clicked button
  evt.currentTarget.className += " active";
}

// Auto-open default tab
document.getElementById("defaultOpen").click();
</script>

</body>
</html>
